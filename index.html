<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チェキメーカー</title>
<style>
  :root {
    --bg-1: #fff8ff;
    --bg-2: #f7f4ff;
    --bg-3: #eef8ff;
    --ink: #5e5577;
    --muted: #8f87ab;
    --pink: #ff8fcb;
    --pink-deep: #f369b1;
    --lavender: #b39bff;
    --lavender-deep: #8f79eb;
    --sky: #8ad8ff;
    --mint: #b6f0e0;
    --card: rgba(255, 255, 255, 0.92);
    --line: rgba(192, 171, 255, 0.35);
    --shadow: 0 12px 32px rgba(180, 150, 255, 0.18);
    --shadow-soft: 0 8px 20px rgba(180, 150, 255, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: var(--ink);
    padding: 16px;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    background:
      radial-gradient(circle at 15% 15%, rgba(255, 202, 233, 0.65) 0, rgba(255, 202, 233, 0) 28%),
      radial-gradient(circle at 85% 10%, rgba(180, 220, 255, 0.55) 0, rgba(180, 220, 255, 0) 25%),
      radial-gradient(circle at 20% 85%, rgba(214, 199, 255, 0.55) 0, rgba(214, 199, 255, 0) 28%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.03em;
    margin: 6px 0 6px;
    color: #6f5ec6;
    text-shadow: 0 2px 0 rgba(255,255,255,0.9);
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 18px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(196, 181, 253, 0.45);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(8px);
  }

  .tabs {
    display: flex;
    gap: 8px;
    padding: 8px;
    border: 1px solid rgba(196, 181, 253, 0.35);
    background: rgba(255,255,255,0.62);
    border-radius: 18px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(10px);
  }

  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    border-radius: 14px;
    cursor: pointer;
    background: transparent;
    border: none;
    transition: 0.2s ease;
  }

  .tab:hover {
    background: rgba(255,255,255,0.5);
  }

  .tab.active {
    color: #fff;
    background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 55%, var(--sky) 100%);
    box-shadow: 0 10px 24px rgba(180, 150, 255, 0.28);
  }

  section { display: none; }
  section.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .step-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: #fff;
    margin-bottom: 12px;
    padding: 7px 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--lavender-deep) 100%);
    box-shadow: 0 8px 16px rgba(194, 124, 236, 0.25);
  }

  .frame-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .frame-item {
    position: relative;
    aspect-ratio: 1/1;
    border-radius: 16px;
    border: 2px solid rgba(196, 181, 253, 0.45);
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    background:
      linear-gradient(45deg, rgba(255,255,255,0.8) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.8) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.8) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.8) 75%),
      linear-gradient(135deg, #ffe9f6 0%, #f3eefe 55%, #e8f7ff 100%);
    background-size: 16px 16px, 16px 16px, 16px 16px, 16px 16px, cover;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0, center;
  }

  .frame-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 24px rgba(180, 150, 255, 0.18);
  }

  .frame-item.selected {
    border-color: var(--pink);
    box-shadow: 0 0 0 4px rgba(255, 179, 219, 0.35), 0 14px 24px rgba(180, 150, 255, 0.18);
  }

  .frame-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 6px;
  }

  .frame-item .name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, rgba(126, 107, 217, 0.05) 0%, rgba(111, 94, 198, 0.82) 100%);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-msg {
    font-size: 13px;
    color: var(--muted);
    padding: 12px 4px;
    line-height: 1.6;
  }

  .upload-btn {
    display: block;
    width: 100%;
    padding: 15px;
    text-align: center;
    border: 2px dashed rgba(179, 155, 255, 0.55);
    border-radius: 16px;
    color: #7568aa;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(255, 236, 247, 0.95) 0%, rgba(244, 239, 255, 0.95) 58%, rgba(234, 248, 255, 0.95) 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    transition: 0.18s ease;
  }

  .upload-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 20px rgba(180, 150, 255, 0.14);
  }

  .upload-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  input[type=file] { display: none; }

  canvas#composeCanvas {
    width: 100%;
    height: auto;
    border-radius: 16px;
    background:
      linear-gradient(45deg, rgba(255,255,255,0.88) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.88) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.88) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.88) 75%),
      linear-gradient(135deg, #ffeaf7 0%, #f5f0ff 52%, #edf8ff 100%);
    background-size: 18px 18px, 18px 18px, 18px 18px, 18px 18px, cover;
    background-position: 0 0, 0 9px, 9px -9px, -9px 0, center;
    border: 1px solid rgba(196, 181, 253, 0.45);
    touch-action: none;
    display: block;
    box-shadow: var(--shadow-soft);
  }

  .controls { margin-top: 14px; }

  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .control-row label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
  }

  .control-row input[type=range] {
    flex: 1;
    accent-color: var(--pink-deep);
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.18s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 55%, var(--sky) 100%);
    box-shadow: 0 12px 22px rgba(180, 150, 255, 0.24);
  }

  .btn-primary:disabled {
    background: linear-gradient(135deg, #f1d8ec 0%, #ddd7f8 100%);
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-ghost {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(196, 181, 253, 0.45);
    color: #7568aa;
    margin-top: 8px;
  }

  .frame-manage-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 2px;
    border-bottom: 1px solid rgba(196, 181, 253, 0.18);
  }

  .frame-manage-item img {
    width: 58px;
    height: 58px;
    object-fit: contain;
    border-radius: 12px;
    border: 1px solid rgba(196, 181, 253, 0.35);
    background:
      linear-gradient(135deg, #fff6fb 0%, #f5efff 55%, #eef9ff 100%);
    box-shadow: var(--shadow-soft);
  }

  .frame-manage-item .fname {
    flex: 1;
    font-size: 13px;
    color: var(--ink);
    word-break: break-all;
  }

  .frame-manage-item button {
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(255, 143, 203, 0.55);
    color: #d74e96;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 10px;
    cursor: pointer;
  }

  .frame-manage-item button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .status-msg {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.65;
  }

  .notice {
    font-size: 12px;
    color: #7d5aa7;
    background: linear-gradient(135deg, rgba(255,240,248,0.94) 0%, rgba(243,239,255,0.94) 100%);
    border: 1px solid rgba(196, 181, 253, 0.45);
    border-radius: 18px;
    padding: 10px 12px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-soft);
  }

  .auth-grid { display: grid; gap: 8px; }

  .text-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(196, 181, 253, 0.45);
    font-size: 14px;
    background: rgba(255,255,255,0.88);
    color: var(--ink);
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }

  .text-input:focus {
    border-color: rgba(243, 105, 177, 0.65);
    box-shadow: 0 0 0 4px rgba(255, 179, 219, 0.22);
  }

  @media (max-width: 420px) {
    body { padding: 12px; }
    .card { padding: 14px; border-radius: 18px; }
    .frame-grid { gap: 8px; }
    .sub { border-radius: 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>チェキメーカー ✦</h1>
  <p class="sub">ゆめかわフレームで、写真を重ねて、かわいく保存</p>

  <div class="tabs">
    <button class="tab active" data-tab="make">作る</button>
    <button class="tab" data-tab="manage">フレーム管理</button>
  </div>

  <section id="make" class="active">
    <div class="card">
      <div class="step-label">STEP 1・フレームを選ぶ</div>
      <div id="frameGrid" class="frame-grid"></div>
      <div id="frameEmptyMsg" class="empty-msg" style="display:none;">フレームがまだ登録されていません。管理者が「フレーム管理」タブから追加してください。</div>
    </div>

    <div class="card">
      <div class="step-label">STEP 2・写真を選ぶ</div>
      <label class="upload-btn" id="photoUploadLabel">写真をアップロード</label>
      <input type="file" id="photoInput" accept="image/*">
    </div>

    <div class="card" id="composeCard" style="display:none;">
      <div class="step-label">STEP 3・位置を調整して保存</div>
      <canvas id="composeCanvas"></canvas>
      <div class="controls">
        <div class="control-row">
          <label>拡大</label>
          <input type="range" id="zoomRange" min="50" max="300" value="100">
        </div>
      </div>
      <p class="status-msg" id="canvasStatus">写真をドラッグすると位置を調整できます</p>
      <button class="btn btn-primary" id="downloadBtn">画像を保存</button>
    </div>
  </section>

  <section id="manage">
    <div class="notice">共通フレームはSupabase Storageに保存されます。ログインなしで誰でも透過PNGフレームを追加できます。削除は事故防止のため、この画面からは行えません。</div>

    <div class="card">
      <div class="step-label">フレームを追加</div>
      <label class="upload-btn" id="frameUploadLabel">透過PNGフレームをアップロード</label>
      <input type="file" id="frameInput" accept="image/png">
      <p class="status-msg" id="frameUploadStatus">ログインなしでアップロードできます。PNGのみ対応です。</p>
    </div>
    <div class="card">
      <div class="step-label">登録済みフレーム</div>
      <div id="frameManageList"></div>
      <div id="manageEmptyMsg" class="empty-msg" style="display:none;">まだフレームがありません</div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase設定 =====
// Supabaseの Project URL と anon public key に差し替えてください。
const SUPABASE_URL = 'https://hkgmjvwazgjixeztmbd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_46aIkoNlXH8NMWWT2IvQig_6yjSyrn4';
const FRAME_BUCKET = 'cheki-frames';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let frames = [];
let selectedFrameId = null;
let photoImg = null;
let frameImg = null;
let photoState = { x: 0, y: 0, scale: 1, baseScale: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0, px: 0, py: 0 };
let canvasW = 600;
let canvasH = 800;

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function isSupabaseConfigured() {
  return !SUPABASE_URL.includes('YOUR_PROJECT_ID') && !SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_PUBLIC_KEY');
}

function displayNameFromPath(path) {
  const fileName = path.split('/').pop() || path;
  return fileName
    .replace(/^\d+_[a-z0-9]+_/, '')
    .replace(/\.[^.]+$/, '');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateCanvasStatus() {
  const status = document.getElementById('canvasStatus');
  if (!status) return;
  if (frameImg) {
    status.textContent = '写真をドラッグすると位置を調整できます。保存サイズ：' + canvasW + ' × ' + canvasH + 'px';
  } else {
    status.textContent = '写真をドラッグすると位置を調整できます';
  }
}

function resizeCanvasToFrame(img) {
  canvasW = Math.max(1, Math.round(img.naturalWidth || img.width || 600));
  canvasH = Math.max(1, Math.round(img.naturalHeight || img.height || 800));
  canvas.width = canvasW;
  canvas.height = canvasH;
  if (photoImg) resetPhotoFit();
  updateCanvasStatus();
}

function resetPhotoFit() {
  if (!photoImg) return;
  const scaleX = canvasW / photoImg.width;
  const scaleY = canvasH / photoImg.height;
  photoState.baseScale = Math.max(scaleX, scaleY);
  photoState.scale = 1;
  photoState.x = 0;
  photoState.y = 0;
  document.getElementById('zoomRange').value = 100;
}

async function loadFrames() {
  const emptyMsg = document.getElementById('frameEmptyMsg');

  if (!isSupabaseConfigured()) {
    frames = [];
    emptyMsg.textContent = 'Supabase設定が未入力です。HTML内の SUPABASE_URL と SUPABASE_ANON_KEY を設定してください。';
    renderFrameGrid();
    renderFrameManageList();
    return;
  }

  const { data, error } = await sb.storage
    .from(FRAME_BUCKET)
    .list('', { limit: 100, sortBy: { column: 'created_at', order: 'asc' } });

  if (error) {
    frames = [];
    emptyMsg.textContent = 'フレーム一覧の取得に失敗しました。SupabaseのBucket名・Policyを確認してください。';
    renderFrameGrid();
    renderFrameManageList();
    console.error(error);
    return;
  }

  frames = (data || [])
    .filter(item => item.name && item.name.toLowerCase().endsWith('.png'))
    .map(item => {
      const { data: publicData } = sb.storage.from(FRAME_BUCKET).getPublicUrl(item.name);
      return {
        id: item.name,
        path: item.name,
        name: displayNameFromPath(item.name),
        url: publicData.publicUrl,
        createdAt: item.created_at || ''
      };
    });

  if (selectedFrameId && !frames.some(f => f.id === selectedFrameId)) {
    selectedFrameId = null;
    frameImg = null;
  }

  renderFrameGrid();
  renderFrameManageList();
}

async function uploadFrameFile(file) {
  if (!file || file.type !== 'image/png') throw new Error('PNGファイルのみアップロードできます');

  const safeName = file.name.replace(/[\\/:*?"<>|#%&{}$!'@+=`]/g, '_');
  const path = Date.now() + '_' + uid() + '_' + safeName;

  const { error } = await sb.storage
    .from(FRAME_BUCKET)
    .upload(path, file, {
      contentType: 'image/png',
      cacheControl: '3600',
      upsert: false
    });

  if (error) throw error;
  await loadFrames();
}

async function deleteFrame(id) {
  alert('この版では画面から削除できません。削除したい場合はSupabaseのStorage画面から削除してください。');
}

function renderFrameGrid() {
  const grid = document.getElementById('frameGrid');
  const emptyMsg = document.getElementById('frameEmptyMsg');
  grid.innerHTML = '';
  if (frames.length === 0) {
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';
  frames.forEach(f => {
    const div = document.createElement('div');
    div.className = 'frame-item' + (f.id === selectedFrameId ? ' selected' : '');
    div.innerHTML = '<img src="' + f.url + '" crossorigin="anonymous"><div class="name">' + escapeHtml(f.name) + '</div>';
    div.addEventListener('click', () => selectFrame(f.id));
    grid.appendChild(div);
  });
}

function renderFrameManageList() {
  const list = document.getElementById('frameManageList');
  const emptyMsg = document.getElementById('manageEmptyMsg');
  list.innerHTML = '';
  if (frames.length === 0) {
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';
  frames.forEach(f => {
    const row = document.createElement('div');
    row.className = 'frame-manage-item';
    row.innerHTML = '<img src="' + f.url + '" crossorigin="anonymous"><div class="fname">' + escapeHtml(f.name) + '</div>';
    const note = document.createElement('div');
    note.className = 'status-msg';
    note.style.marginTop = '0';
    note.textContent = '削除はSupabase側で実行';
    row.appendChild(note);
    list.appendChild(row);
  });
}

function selectFrame(id) {
  selectedFrameId = id;
  renderFrameGrid();
  const f = frames.find(x => x.id === id);
  if (!f) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    frameImg = img;
    resizeCanvasToFrame(img);
    if (photoImg) {
      document.getElementById('composeCard').style.display = 'block';
      drawCanvas();
    }
  };
  img.onerror = () => {
    alert('フレーム画像の読み込みに失敗しました。');
  };
  img.src = f.url;
}

document.getElementById('frameInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('frameUploadStatus');
  try {
    statusEl.textContent = 'アップロード中です...';
    await uploadFrameFile(file);
    statusEl.textContent = '「' + file.name.replace(/\.[^.]+$/, '') + '」を追加しました。';
  } catch (err) {
    statusEl.textContent = err.message || '保存に失敗しました。もう一度お試しください。';
    console.error(err);
  } finally {
    e.target.value = '';
  }
});

document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      photoImg = img;
      resetPhotoFit();

      if (!selectedFrameId && frames.length > 0) {
        selectFrame(frames[0].id);
      } else if (frameImg) {
        resizeCanvasToFrame(frameImg);
        document.getElementById('composeCard').style.display = 'block';
        drawCanvas();
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

const canvas = document.getElementById('composeCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvasW;
canvas.height = canvasH;

function drawCanvas() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.fillStyle = '#ddd';
  ctx.fillRect(0, 0, canvasW, canvasH);
  if (photoImg) {
    const s = photoState.baseScale * photoState.scale;
    const w = photoImg.width * s;
    const h = photoImg.height * s;
    const cx = canvasW / 2 + photoState.x;
    const cy = canvasH / 2 + photoState.y;
    ctx.drawImage(photoImg, cx - w / 2, cy - h / 2, w, h);
  }
  if (frameImg) {
    ctx.drawImage(frameImg, 0, 0, canvasW, canvasH);
  }
  updateCanvasStatus();
}

function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) * (canvasW / rect.width), y: (cy - rect.top) * (canvasH / rect.height) };
}

function startDrag(e) {
  if (!photoImg) return;
  dragging = true;
  const p = getPointerPos(e);
  dragStart = { x: p.x, y: p.y, px: photoState.x, py: photoState.y };
}
function moveDrag(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = getPointerPos(e);
  photoState.x = dragStart.px + (p.x - dragStart.x);
  photoState.y = dragStart.py + (p.y - dragStart.y);
  drawCanvas();
}
function endDrag() { dragging = false; }

canvas.addEventListener('mousedown', startDrag);
canvas.addEventListener('mousemove', moveDrag);
window.addEventListener('mouseup', endDrag);
canvas.addEventListener('touchstart', startDrag, { passive: true });
canvas.addEventListener('touchmove', moveDrag, { passive: false });
canvas.addEventListener('touchend', endDrag);

document.getElementById('zoomRange').addEventListener('input', (e) => {
  photoState.scale = Number(e.target.value) / 100;
  drawCanvas();
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  try {
    const link = document.createElement('a');
    link.download = 'cheki_' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    alert('画像保存に失敗しました。フレーム画像のCORS設定を確認してください。');
    console.error(err);
  }
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('frameUploadLabel').addEventListener('click', () => {
  document.getElementById('frameInput').click();
});
document.getElementById('photoUploadLabel').addEventListener('click', () => {
  document.getElementById('photoInput').click();
});

loadFrames();
</script>
</body>
</html>
